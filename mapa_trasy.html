    border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);

  .num-icon.via { background: #888; width: 20px; height: 20px; line-height: 20px; font-size: 10px; }

}

  { ll: [57.5880, 9.9594], label: '⛴', cls: 'home', name: 'Hirtshals (DK)', info: 'Nalodění na trajekt do Kristiansandu. Předem namrazit PET lahve — plyn na trajektu vypnutý!' },
  { ll: [58.1467, 7.9956], label: '1', name: 'Kristiansand — Ne', info: 'Příjezd trajektem ~15:30. POZOR: KristiansAnd, ne KristiansUnd! Pak přesun k Preikestolen (~3,5 h).' },
