<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norsko 2026 — interaktivní mapa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{--modra:#0b3d66}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  #bar{background:var(--modra);color:#fff;padding:10px 16px;display:flex;align-items:center;
       justify-content:space-between;flex-wrap:wrap;gap:8px}
  #bar a{color:#cfe6f5;text-decoration:none;font-size:.9rem}
  #bar b{font-size:1.05rem}
  #legend{font-size:.8rem;display:flex;gap:12px;flex-wrap:wrap;background:#fff;color:#333;
          padding:8px 16px;border-bottom:1px solid #dce6ee}
  #legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block}
  #map{position:absolute;top:0;bottom:0;left:0;right:0}
  #wrap{position:absolute;top:0;bottom:0;left:0;right:0;display:flex;flex-direction:column}
  #mapwrap{flex:1;position:relative}
  .leaflet-popup-content{font-size:.9rem;line-height:1.45}
  .leaflet-popup-content h3{margin:0 0 4px;color:var(--modra);font-size:1rem}
  .leaflet-popup-content .den{display:inline-block;background:#e8f1f7;color:var(--modra);
       font-weight:600;font-size:.75rem;padding:1px 8px;border-radius:10px;margin-bottom:6px}
  .leaflet-popup-content .warn{color:#c0392b;font-weight:600}
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <b>🗺️ Norsko 2026 — mapa cesty</b>
    <a href="index.html">← zpět na rozcestník</a>
  </div>
  <div id="legend">
    <span><i class="dot" style="background:#27ae60"></i> start / cíl</span>
    <span><i class="dot" style="background:#2980b9"></i> trajekt / přejezd</span>
    <span><i class="dot" style="background:#c0392b"></i> náročný trek</span>
    <span><i class="dot" style="background:#8e44ad"></i> vyhlídka / fjord</span>
    <span><i class="dot" style="background:#16a085"></i> ledovec / jezero</span>
    <span><i class="dot" style="background:#e67e22"></i> město / serpentiny</span>
  </div>
  <div id="mapwrap"><div id="map"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const barvy={start:'#27ae60',ferry:'#2980b9',trek:'#c0392b',view:'#8e44ad',ice:'#16a085',city:'#e67e22'};

// Zastávky v pořadí itineráře. Souřadnice jsou orientační (slavná místa).
const stops=[
 {n:'Modřice — start',c:[49.13,16.61],t:'start',den:'',d:'Výjezd z Modřic. Vyzvednutí vozu ~8:00 v Rebešovicích.'},
 {n:'Hirtshals (DK) — přístav',c:[57.59,9.96],t:'ferry',den:'cesta tam',d:'~1100 km z Modřic (2 dny s noclehem). Odtud trajekt Fjord Line / Color Line do Kristiansandu. <b>Rezervovat dopředu!</b>'},
 {n:'Kristiansand (NO) — příjezd',c:[58.15,7.99],t:'ferry',den:'Ne',d:'Příjezd trajektem ~15:30. <span class="warn">Pozor: Kristiansand (jih), ne KristiansUnd!</span> Pak ~3,5 h k Preikestolen.'},
 {n:'Preikestolen',c:[58.987,6.188],t:'trek',den:'Po',d:'Výšlap na slavnou „kazatelnu" — 8 km, ~4–5 h. Nocleh u parkoviště.'},
 {n:'Trolltunga',c:[60.124,6.740],t:'trek',den:'Út',d:'Náročný celodenní trek ~28 km, 800 m převýšení. <span class="warn">Vyrazit brzy ráno, parkoviště P2/P3 rezervovat předem.</span>'},
 {n:'Tvindefossen',c:[60.766,6.476],t:'view',den:'St',d:'Vodopád hned u silnice. V kombinaci se Stegasteinem.'},
 {n:'Stegastein',c:[60.904,7.275],t:'view',den:'St',d:'Vyhlídka nad Aurlandsfjordem. <span class="warn">Úzká klikatá cesta — s obytkou opatrně.</span>'},
 {n:'Bøyabreen / Sognefjord',c:[61.47,6.83],t:'ice',den:'Čt',d:'Nejdelší norský fjord + ledovec Bøyabreen hned u cesty, parkování zdarma.'},
 {n:'Lovatnet',c:[61.83,6.86],t:'ice',den:'Pá',d:'Tyrkysové jezero, možnost kajaku. <span class="warn">Úzká cesta — pozor s obytkou.</span>'},
 {n:'Geirangerfjord',c:[62.11,7.18],t:'view',den:'So',d:'UNESCO. Vyhlídka Ørnesvingen, lodní výlet k vodopádu Sedm sester.'},
 {n:'Ålesund',c:[62.47,6.16],t:'city',den:'Ne',d:'Secesní město, výhled z vrchu Aksla (418 schodů).'},
 {n:'Trollstigen',c:[62.46,7.67],t:'city',den:'Po',d:'Trolí stezka — serpentiny s 11 zatáčkami. <span class="warn">Ověřit sezónní otevření (sesuvy).</span>'},
 {n:'Jotunheimen (Galdhøpiggen)',c:[61.636,8.313],t:'trek',den:'Út–Čt',d:'„Domov obrů" — nejvyšší vrchol Norska 2469 m, Besseggen, ledovce (3 dny). Nejsevernější bod cesty.'},
 {n:'Oslo',c:[59.91,10.75],t:'city',den:'Pá',d:'Průjezd na cestě zpět. <span class="warn">Velmi dlouhá jízda Jotunheimen → Malmö (9–11 h).</span>'},
 {n:'Øresundský most',c:[55.57,12.85],t:'ferry',den:'cesta zpět',d:'Malmö → Kodaň: 8 km most + tunel, placené mýto. Dále Storebælt a Německem domů.'},
 {n:'Malmö',c:[55.60,13.00],t:'city',den:'Pá',d:'Nocleh. Druhý den Malmö → ČR, v neděli vrácení vozu do 13:00 v Rebešovicích.'},
 {n:'Modřice — cíl',c:[49.13,16.61],t:'start',den:'Ne',d:'Vrácení vozu do 13:00 v Rebešovicích.'},
];

const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:18, attribution:'© OpenStreetMap'}).addTo(map);

const latlngs=[];
stops.forEach((s,i)=>{
  latlngs.push(s.c);
  const m=L.circleMarker(s.c,{radius:9,color:'#fff',weight:2,
     fillColor:barvy[s.t],fillOpacity:1}).addTo(map);
  const den=s.den?`<span class="den">${s.den}</span><br>`:'';
  m.bindPopup(`<h3>${i+1}. ${s.n}</h3>${den}${s.d}`);
});

// Trasa: tenká čára propojující zastávky v pořadí
L.polyline(latlngs,{color:'#0b3d66',weight:3,opacity:.55,dashArray:'6,8'}).addTo(map);

map.fitBounds(L.latLngBounds(latlngs).pad(0.12));
</script>
</body>
</html>
