<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norsko 2026 — interaktivní mapa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{--modra:#0b3d66}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  #bar{background:var(--modra);color:#fff;padding:10px 16px;display:flex;align-items:center;
       justify-content:space-between;flex-wrap:wrap;gap:8px}
  #bar a{color:#cfe6f5;text-decoration:none;font-size:.9rem}
  #bar b{font-size:1.05rem}
  #legend{font-size:.8rem;display:flex;gap:12px;flex-wrap:wrap;background:#fff;color:#333;
          padding:8px 16px;border-bottom:1px solid #dce6ee}
  #legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block}
  #map{position:absolute;top:0;bottom:0;left:0;right:0}
  #wrap{position:absolute;top:0;bottom:0;left:0;right:0;display:flex;flex-direction:column}
  #mapwrap{flex:1;position:relative}
  .leaflet-popup-content{font-size:.9rem;line-height:1.45}
  .leaflet-popup-content h3{margin:0 0 4px;color:var(--modra);font-size:1rem}
  .leaflet-popup-content .den{display:inline-block;background:#e8f1f7;color:var(--modra);
       font-weight:600;font-size:.75rem;padding:1px 8px;border-radius:10px;margin-bottom:6px}
  .leaflet-popup-content .warn{color:#c0392b;font-weight:600}
  .leaflet-popup-content .wimg{display:none;width:100%;border-radius:6px;margin-top:8px}
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <b>🗺️ Norsko 2026 — mapa cesty</b>
    <a href="index.html">← zpět na rozcestník</a>
  </div>
  <div id="legend">
    <span><i class="dot" style="background:#27ae60"></i> start / cíl</span>
    <span><i class="dot" style="background:#2980b9"></i> trajekt / přejezd</span>
    <span><i class="dot" style="background:#c0392b"></i> náročný trek</span>
    <span><i class="dot" style="background:#8e44ad"></i> vyhlídka / fjord</span>
    <span><i class="dot" style="background:#16a085"></i> ledovec / jezero</span>
    <span><i class="dot" style="background:#e67e22"></i> město / serpentiny</span>
    <span><i style="display:inline-block;width:20px;height:0;border-top:4px solid #0b3d66;vertical-align:middle"></i> trasa tam (autem)</span>
    <span><i style="display:inline-block;width:20px;height:0;border-top:4px solid #16689c;vertical-align:middle"></i> trasa zpět (autem)</span>
    <span><i style="display:inline-block;width:20px;height:0;border-top:3px dashed #0b3d66;vertical-align:middle"></i> trajekt + norská část</span>
  </div>
  <div id="mapwrap"><div id="map"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
<script>
const barvy={start:'#27ae60',ferry:'#2980b9',trek:'#c0392b',view:'#8e44ad',ice:'#16a085',city:'#e67e22'};

// Zastávky v pořadí itineráře. Souřadnice jsou orientační (slavná místa).
const stops=[
 {n:'Modřice — start',c:[49.13,16.61],t:'start',den:'',w:'Modřice',lang:'cs',d:'Výjezd z Modřic. Vyzvednutí vozu ~8:00 v Rebešovicích.'},
 {n:'Hirtshals (DK) — přístav',c:[57.59,9.96],t:'ferry',den:'cesta tam',w:'Hirtshals',d:'~1100 km z Modřic (2 dny s noclehem). Odtud trajekt Fjord Line / Color Line do Kristiansandu. <b>Rezervovat dopředu!</b>'},
 {n:'Kristiansand (NO) — příjezd',c:[58.15,7.99],t:'ferry',den:'Ne',w:'Kristiansand',d:'Příjezd trajektem ~15:30. <span class="warn">Pozor: Kristiansand (jih), ne KristiansUnd!</span> Pak ~3,5 h k Preikestolen.'},
 {n:'Preikestolen',c:[58.987,6.188],t:'trek',den:'Po',w:'Preikestolen',d:'Výšlap na slavnou „kazatelnu" — 8 km, ~4–5 h. Nocleh u parkoviště.'},
 {n:'Trolltunga',c:[60.124,6.740],t:'trek',den:'Út',w:'Trolltunga',d:'Náročný celodenní trek ~28 km, 800 m převýšení. <span class="warn">Vyrazit brzy ráno, parkoviště P2/P3 rezervovat předem.</span>'},
 {n:'Tvindefossen',c:[60.766,6.476],t:'view',den:'St',w:'Tvindefossen',d:'Vodopád hned u silnice. V kombinaci se Stegasteinem.'},
 {n:'Stegastein',c:[60.904,7.275],t:'view',den:'St',w:'Stegastein',d:'Vyhlídka nad Aurlandsfjordem. <span class="warn">Úzká klikatá cesta — s obytkou opatrně.</span>'},
 {n:'Bøyabreen / Sognefjord',c:[61.47,6.83],t:'ice',den:'Čt',w:'Sognefjord',d:'Nejdelší norský fjord + ledovec Bøyabreen hned u cesty, parkování zdarma.'},
 {n:'Lovatnet',c:[61.83,6.86],t:'ice',den:'Pá',w:'Lovatnet',d:'Tyrkysové jezero, možnost kajaku. <span class="warn">Úzká cesta — pozor s obytkou.</span>'},
 {n:'Geirangerfjord',c:[62.11,7.18],t:'view',den:'So',w:'Geirangerfjorden',d:'UNESCO. Vyhlídka Ørnesvingen, lodní výlet k vodopádu Sedm sester.'},
 {n:'Ålesund',c:[62.47,6.16],t:'city',den:'Ne',w:'Ålesund',d:'Secesní město, výhled z vrchu Aksla (418 schodů).'},
 {n:'Trollstigen',c:[62.46,7.67],t:'city',den:'Po',w:'Trollstigen',d:'Trolí stezka — serpentiny s 11 zatáčkami. <span class="warn">Ověřit sezónní otevření (sesuvy).</span>'},
 {n:'Jotunheimen (Galdhøpiggen)',c:[61.636,8.313],t:'trek',den:'Út–Čt',w:'Jotunheimen',d:'„Domov obrů" — nejvyšší vrchol Norska 2469 m, Besseggen, ledovce (3 dny). Nejsevernější bod cesty.'},
 {n:'Oslo',c:[59.91,10.75],t:'city',den:'Pá',w:'Oslo',d:'Průjezd na cestě zpět. <span class="warn">Velmi dlouhá jízda Jotunheimen → Malmö (9–11 h).</span>'},
 {n:'Øresundský most',c:[55.57,12.85],t:'ferry',den:'cesta zpět',w:'Øresund Bridge',d:'Malmö → Kodaň: 8 km most + tunel, placené mýto. Dále Storebælt a Německem domů.'},
 {n:'Malmö',c:[55.60,13.00],t:'city',den:'Pá',w:'Malmö',d:'Nocleh. Druhý den Malmö → ČR, v neděli vrácení vozu do 13:00 v Rebešovicích.'},
 {n:'Modřice — cíl',c:[49.13,16.61],t:'start',den:'Ne',w:'Modřice',lang:'cs',d:'Vrácení vozu do 13:00 v Rebešovicích.'},
];

const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:18, attribution:'© OpenStreetMap'}).addTo(map);

// Fotka místa — načte se po rozkliknutí z Wikipedie (REST API, bez klíče, v prohlížeči).
const imgCache={};
function loadPhoto(s, el){
  if(!s.w || !el) return;
  const img=el.querySelector('.wimg');
  if(!img) return;
  const lang=s.lang||'en';
  const key=lang+':'+s.w;
  if(key in imgCache){ if(imgCache[key]){img.src=imgCache[key];img.style.display='block';} return; }
  fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(s.w)}`)
    .then(r=>r.ok?r.json():null)
    .then(d=>{
      const src=d&&d.thumbnail&&d.thumbnail.source;
      imgCache[key]=src||'';
      if(src){img.src=src;img.style.display='block';}
    }).catch(()=>{imgCache[key]='';});
}

const latlngs=[];
stops.forEach((s,i)=>{
  latlngs.push(s.c);
  const m=L.circleMarker(s.c,{radius:9,color:'#fff',weight:2,
     fillColor:barvy[s.t],fillOpacity:1}).addTo(map);
  const den=s.den?`<span class="den">${s.den}</span><br>`:'';
  m.bindPopup(`<h3>${i+1}. ${s.n}</h3>${den}${s.d}<img class="wimg" alt="" referrerpolicy="no-referrer">`,{maxWidth:240,minWidth:200});
  m.on('popupopen',()=>loadPhoto(s, m.getPopup().getElement()));
});

// Cesta TAM po silnici: Modřice → Praha → Drážďany → Berlin → Padenstedt → Emmersbæk → Hirtshals
const cestaTam=[
 [49.13,16.60],  // Modřice
 [50.08,14.44],  // Praha
 [51.05,13.74],  // Drážďany
 [52.52,13.40],  // Berlin
 [53.55,10.00],  // Hamburg (na trase)
 [54.04,9.92],   // Padenstedt
 [54.78,9.43],   // Flensburg (hranice DE/DK)
 [57.05,9.92],   // Aalborg (na trase Jutskem)
 [57.573,9.985], // Emmersbæk
 [57.587,9.967]  // Hirtshals (trajekt)
];
const lineTam=L.polyline(cestaTam,{color:'#0b3d66',weight:4,opacity:.85}).addTo(map);

// Cesta ZPĚT po silnici: Oslo → Göteborg → Helsingborg → Malmö → mosty → Kolding → Padenstedt → Berlin → Drážďany → Praha → Modřice
const cestaZpet=[
 [59.91,10.75], // Oslo
 [57.71,11.97], // Göteborg
 [56.05,12.69], // Helsingborg
 [55.60,13.00], // Malmö
 [55.57,12.85], // Øresundský most
 [55.68,12.57], // Kodaň
 [55.34,11.03], // Storebæltský most
 [55.40,10.39], // Odense (Fyn)
 [55.49,9.47],  // Kolding (přes Lillebælt)
 [54.04,9.92],  // Padenstedt
 [53.55,10.00], // Hamburg (na trase)
 [52.52,13.40], // Berlin
 [51.05,13.74], // Drážďany
 [50.08,14.44], // Praha
 [49.13,16.60]  // Modřice
];
const lineZpet=L.polyline(cestaZpet,{color:'#16689c',weight:4,opacity:.85}).addTo(map);

// Trajekt + norská část (Hirtshals → Kristiansand → norské zastávky → Oslo) — přerušovaně
const lineNor=L.polyline(latlngs.slice(1,14),{color:'#0b3d66',weight:3,opacity:.5,dashArray:'6,8'}).addTo(map);

// Směrové šipky ukazující směr jízdy (sledují pořadí bodů na trase)
function smerovky(line,color){
  L.polylineDecorator(line,{patterns:[{
    offset:25, repeat:80,
    symbol:L.Symbol.arrowHead({pixelSize:10,polygon:false,
      pathOptions:{stroke:true,color:color,weight:2,opacity:.9}})
  }]}).addTo(map);
}
smerovky(lineTam,'#0b3d66');
smerovky(lineZpet,'#16689c');
smerovky(lineNor,'#0b3d66');

map.fitBounds(L.latLngBounds([...cestaTam,...cestaZpet,...latlngs]).pad(0.08));
</script>
</body>
</html>
