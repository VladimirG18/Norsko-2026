<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norsko 2026 — poznámky</title>
<style>
  :root{--modra:#0b3d66;--modra2:#16689c;--led:#e8f1f7;--akcent:#c0392b;
        --text:#1c2733;--slabe:#5b6b7a}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       color:var(--text);background:var(--led);line-height:1.5}
  .topbar{background:var(--modra);color:#fff;padding:10px 16px;display:flex;
          justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .topbar a{color:#cfe6f5;text-decoration:none;font-size:.9rem}
  .wrap{max-width:820px;margin:18px auto;padding:0 14px}
  h1{color:var(--modra);font-size:1.5rem;margin:6px 0 2px}
  .sub{color:var(--slabe);font-size:.92rem;margin:0 0 16px}

  /* stavový proužek připojení */
  .statusbar{font-size:.82rem;color:var(--slabe);padding:9px 12px;border:1px solid #dce6ee;
             border-radius:9px;margin:4px 0 16px;background:#fff}
  .statusbar.ok{color:#1f8f57;border-color:#9bd9b5;background:#f1faf4}
  .statusbar.warn{color:#9a6b00;border-color:#e8cf8a;background:#fdf8ea}

  /* formulář poznámky */
  .noteform{background:#fff;border:1px solid #dce6ee;border-radius:12px;padding:16px;
            margin:6px 0 22px;box-shadow:0 3px 12px rgba(11,61,102,.09)}
  .noteform .frow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .noteform label{font-size:.85rem;color:var(--slabe)}
  .noteform select,.noteform textarea{background:#fff;color:var(--text);border:1px solid #cdd9e3;
       border-radius:8px;padding:9px 11px;font:inherit}
  .noteform select{min-width:140px}
  .noteform textarea{width:100%;min-height:160px;resize:vertical;line-height:1.5}
  .noteform .send{background:var(--modra);border:1px solid var(--modra);color:#fff;font-weight:600;
       border-radius:8px;padding:9px 16px;cursor:pointer;font:inherit}
  .noteform .send:hover{background:var(--modra2);border-color:var(--modra2)}
  .noteform .send:disabled{opacity:.6;cursor:default}

  /* seznam poznámek */
  .notelist{display:flex;flex-direction:column;gap:12px}
  .noteitem{background:#fff;border:1px solid #dce6ee;border-left-width:4px;border-radius:10px;
            padding:12px 14px;box-shadow:0 3px 12px rgba(11,61,102,.07)}
  .noteitem .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
  .noteitem .who{font-weight:700}
  .noteitem .when{color:var(--slabe);font-size:.78rem}
  .noteitem .text{white-space:pre-wrap;line-height:1.5;font-size:.94rem}
  .noteitem .del{background:none;border:none;color:var(--slabe);cursor:pointer;font-size:.95rem;
       padding:2px 6px;border-radius:6px}
  .noteitem .del:hover{color:var(--akcent)}
  .empty{color:var(--slabe);font-style:italic;padding:14px 0}

  /* barvy autorů */
  .who-lucka{color:#c0398f}    .border-lucka{border-left-color:#e879c9}
  .who-vladimir{color:#16689c} .border-vladimir{border-left-color:#4f9eff}
  .who-jirka{color:#1f8f57}    .border-jirka{border-left-color:#2ec27e}
  .who-jarka{color:#9a6b00}    .border-jarka{border-left-color:#e3b341}

  .note{margin-top:22px;font-size:.8rem;color:var(--slabe);font-style:italic}
</style>
</head>
<body>
<div class="topbar">
  <b>📝 Norsko 2026 — poznámky</b>
  <a href="index.html">← rozcestník</a>
</div>
<div class="wrap">
  <h1>Poznámky</h1>
  <p class="sub">Zapiš poznámku a vyber, kdo ji píše. Poznámky se řadí od nejnovější.</p>

  <div id="status" class="statusbar"></div>

  <div class="noteform">
    <div class="frow">
      <label for="author">Autor:</label>
      <select id="author">
        <option value="Lucka">Lucka</option>
        <option value="Vladimír">Vladimír</option>
        <option value="Jirka">Jirka</option>
        <option value="Jarka">Jarka</option>
      </select>
    </div>
    <textarea id="text" placeholder="Sem napiš poznámku…"></textarea>
    <div class="frow" style="margin-top:10px;justify-content:flex-end">
      <button class="send" id="add">Přidat poznámku</button>
    </div>
  </div>

  <div class="notelist" id="list"></div>

  <p class="note" id="footnote"></p>
</div>

<script type="module">
// Sdílený online backend (Firebase / Firestore) – poznámky vidí všichni v reálném čase.
// Stejný Firebase projekt jako u domu, ale vlastní kolekce, ať se poznámky nemíchají.
const firebaseConfig = {
  apiKey: "AIzaSyCLU7cH1tXPqnaxVV_-BsSNssl-NU9Pz1I",
  authDomain: "rd-modrice-e9477.firebaseapp.com",
  projectId: "rd-modrice-e9477",
  storageBucket: "rd-modrice-e9477.firebasestorage.app",
  messagingSenderId: "941681195558",
  appId: "1:941681195558:web:3aac10f182e784cdb3c4e7"
};
const COLLECTION = 'poznamky-norsko';   // oddělená kolekce pro Norsko

const KEY = 'norsko2026-poznamky-v1';
const slug = s => s.toLowerCase().replace('á','a').replace('í','i').replace('ř','r');

const authorEl = document.getElementById('author');
const textEl = document.getElementById('text');
const listEl = document.getElementById('list');
const statusEl = document.getElementById('status');
const footEl = document.getElementById('footnote');
const addBtn = document.getElementById('add');

// zapamatuj si naposledy zvoleného autora
const lastAuthor = localStorage.getItem(KEY + '-author');
if(lastAuthor) authorEl.value = lastAuthor;

function fmt(ts){
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('cs-CZ') + ' ' + d.toLocaleTimeString('cs-CZ', {hour:'2-digit', minute:'2-digit'});
}

function render(notes){
  listEl.innerHTML = '';
  if(!notes || notes.length === 0){
    listEl.innerHTML = '<div class="empty">Zatím tu nejsou žádné poznámky.</div>';
    return;
  }
  notes.slice().sort((a,b)=> (b.ts||0) - (a.ts||0)).forEach(n => {
    const s = slug(n.author || '');
    const div = document.createElement('div');
    div.className = 'noteitem border-' + s;
    const head = document.createElement('div');
    head.className = 'head';
    head.innerHTML = `<span class="who who-${s}">${n.author||''}</span>
      <span style="display:flex;align-items:center;gap:8px">
        <span class="when">${fmt(n.ts)}</span>
        <button class="del" title="Smazat">🗑</button></span>`;
    const text = document.createElement('div');
    text.className = 'text';
    text.textContent = n.text;
    head.querySelector('.del').addEventListener('click', ()=>{
      if(!confirm('Smazat tuto poznámku?')) return;
      backend.remove(n.id);
    });
    div.appendChild(head); div.appendChild(text);
    listEl.appendChild(div);
  });
}

// Lokální záloha pro případ, že online databáze není dostupná.
function localBackend(){
  let notes = [];
  try { notes = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ notes = []; }
  const save = ()=> localStorage.setItem(KEY, JSON.stringify(notes));
  return {
    subscribe(cb){ cb(notes); this._cb = cb; },
    add(author, text){
      notes.push({ id: Date.now()+'-'+Math.random().toString(36).slice(2,7), author, text, ts: Date.now() });
      save(); this._cb(notes);
    },
    remove(id){ notes = notes.filter(n => n.id !== id); save(); this._cb(notes); }
  };
}

// Sdílený backend přes Firebase Firestore.
async function firebaseBackend(){
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy }
    = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const col = collection(db, COLLECTION);
  return {
    subscribe(cb){
      onSnapshot(query(col, orderBy('ts','desc')), (snap)=>{
        cb(snap.docs.map(d => ({ id:d.id, ...d.data() })));
      }, (err)=>{
        console.error(err);
        statusEl.innerHTML = '⚠️ Chyba připojení k databázi – zkontroluj pravidla Firestore.';
        statusEl.className = 'statusbar warn';
      });
    },
    add(author, text){ return addDoc(col, { author, text, ts: Date.now() }); },
    remove(id){ return deleteDoc(doc(db, COLLECTION, id)); }
  };
}

let backend;
const useFirebase = firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey.length > 10;

if(useFirebase){
  try {
    backend = await firebaseBackend();
    statusEl.innerHTML = '🟢 Sdílené online – poznámky vidí všichni v reálném čase.';
    statusEl.className = 'statusbar ok';
    footEl.textContent = 'Poznámky se ukládají do sdílené online databáze (Firebase) a aktualizují se všem v reálném čase.';
  } catch(e){
    console.error(e);
    backend = localBackend();
    statusEl.innerHTML = '⚠️ Online databázi se nepodařilo načíst – používá se lokální ukládání na tomto zařízení.';
    statusEl.className = 'statusbar warn';
    footEl.textContent = 'Online databáze není dostupná, poznámky se ukládají jen do tohoto prohlížeče.';
  }
} else {
  backend = localBackend();
  statusEl.innerHTML = '🔒 Jen na tomto zařízení.';
  statusEl.className = 'statusbar';
  footEl.textContent = 'Poznámky se ukládají jen do tohoto prohlížeče (localStorage).';
}

backend.subscribe(render);

addBtn.addEventListener('click', async ()=>{
  const text = textEl.value.trim();
  if(!text){ textEl.focus(); return; }
  localStorage.setItem(KEY + '-author', authorEl.value);
  addBtn.disabled = true;
  try { await backend.add(authorEl.value, text); textEl.value = ''; }
  catch(e){ console.error(e); alert('Poznámku se nepodařilo uložit.'); }
  finally { addBtn.disabled = false; textEl.focus(); }
});

// Ctrl/Cmd + Enter pro rychlé přidání
textEl.addEventListener('keydown', (e)=>{
  if((e.ctrlKey || e.metaKey) && e.key === 'Enter') addBtn.click();
});
</script>
</body>
</html>
